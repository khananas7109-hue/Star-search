<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StarSearch - Celebrity Vision AI</title>
    <style>
      body { background-color: #09090b; }
      #root:empty::before {
        content: "INITIALIZING STARSEARCH SYSTEMS...";
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: monospace;
        color: #8b5cf6;
        font-size: 10px;
        letter-spacing: 0.5em;
        opacity: 0.5;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 0.6; }
      }
    </style>
  </head>

    <div id="root"></div>
